{{- if .Values.ingress.enabled -}}
{{- $fullName := include "sequiascope.fullname" . -}}
{{- if and .Values.ingress.className (not (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion)) }}
  {{- if not (hasKey .Values.ingress.annotations "kubernetes.io/ingress.class") }}
  {{- $_ := set .Values.ingress.annotations "kubernetes.io/ingress.class" .Values.ingress.className}}
  {{- end }}
{{- end }}
{{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1
{{- else if semverCompare ">=1.14-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1beta1
{{- else -}}
apiVersion: extensions/v1beta1
{{- end }}
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "sequiascope.labels" . | nindent 4 }}
  {{- $annotations := .Values.ingress.annotations | default dict }}
  {{- if and .Values.ingress.auth .Values.ingress.auth.enabled }}
    {{- /* Priority: existingSecret > generated name */}}
      {{- $secretName := coalesce .Values.ingress.auth.existingSecret (printf "%s-basic-auth" $fullName) }}
    {{- $authAnnotations := dict 
        "nginx.ingress.kubernetes.io/auth-type" "basic"
        "nginx.ingress.kubernetes.io/auth-secret" $secretName
        "nginx.ingress.kubernetes.io/auth-realm" "Authentication Required"
    }}
    {{- $annotations = merge $authAnnotations $annotations }}
  {{- end }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if and .Values.ingress.className (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion) }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- $host := coalesce .Values.ingress.host (include "dns.name" .) }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $host }}
      secretName: {{ $host | replace "." "-" }}-tls
  {{- end }}
  rules:
    - host: {{ $host }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ .Values.service.appPort }}
          - path: /igv-static
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ .Values.service.igvPort }}
{{- end }}
